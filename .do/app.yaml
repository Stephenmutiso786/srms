name: elimu-hub
region: nyc
services:
  - name: web
    environment_slug: docker
    dockerfile_path: Dockerfile
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    health_check:
      http_path: /api/health
      initial_delay_seconds: 20
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: APP_NAME
        value: Elimu Hub
      - key: DB_DRIVER
        value: mysql
      - key: DB_HOST
        value: ""
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: "srms_makumbusho"
      - key: DB_USER
        value: ""
      - key: DB_PASS
        value: ""
        type: SECRET
      - key: APP_URL
        value: ""
      - key: APP_SECRET
        value: ""
        type: SECRET
      - key: DB_SSL_MODE
        value: REQUIRED
